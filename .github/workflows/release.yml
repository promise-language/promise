# Tag-triggered release pipeline (docs/release-automation.md §5).
#
# Triggered by an `epoch-*` tag (e.g. `epoch-2026.0`, or `epoch-next` for the
# pre-release channel). Mirrors the build order of §2 via T0773's `bin/release`
# driver — but per T0797 the **per-epoch blobs job is gone**. Prebuilt dependency
# blobs (LLVM opt/llc/lld) are content-addressed, immutable, and change only on a
# dep version bump; they are produced + uploaded LOCALLY (T0797) by a
# maintainer into a dedicated `deps-<dep>-<version>` release, recorded in
# `tools/build/blobs.json`. Each per-epoch run projects the catalog into a
# runtime manifest (`bin/release manifest --from-catalog`) and pulls the
# pre-hosted blobs on demand (`bin/release fetch-blobs`), saving ~10 min of
# brotli-11 and ~700 MB of upstream LLVM download on every release.
#
# Two jobs:
#   compiler (matrix per host) — build the thin + full compiler variants
#   publish  (single runner)   — integrity-gate, checksum, and cut the Release
name: Release

on:
  push:
    tags: ['epoch-*']   # covers epoch-YYYY.N (stable) and epoch-next (pre-release)
  # Manual dispatch for TESTING the pipeline without cutting a tag: pick a host (or
  # all) and whether to actually publish. With publish=false it builds + uploads the
  # binaries as run artifacts but creates NO GitHub release — a cheap way to validate
  # artifact creation on a single platform (e.g. linux only, 1x) without burning the
  # macOS 10x / Windows 2x multipliers.
  workflow_dispatch:
    inputs:
      platform:
        description: "Host(s) to build"
        type: choice
        default: all
        options:
          - all
          - linux-amd64
          - darwin-arm64
          - windows-amd64
      publish:
        description: "Create the GitHub release (off = build + upload artifacts only)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # Resolve the host(s) to build into the compiler matrix. On a tag push there is
  # no `platform` input → defaults to all 3. On workflow_dispatch it honors the
  # selection, so non-selected hosts never spin up a runner (a job-level `if`
  # cannot see `matrix`, hence this setup job).
  setup:
    runs-on: ubuntu-24.04
    outputs:
      compiler: ${{ steps.pick.outputs.compiler }}
    steps:
      - id: pick
        shell: bash
        env:
          PLATFORM: ${{ github.event.inputs.platform }}
        run: |
          P="${PLATFORM:-all}"
          compiler='[{"host":"linux-amd64","runner":"ubuntu-24.04","ext":""},{"host":"darwin-arm64","runner":"macos-latest","ext":""},{"host":"windows-amd64","runner":"windows-latest","ext":".exe"}]'
          # Deferred (docs/release-automation.md §7): darwin-amd64 (macos-13), linux-arm64.
          if [ "$P" = "all" ]; then
            echo "compiler={\"include\":$compiler}" >> "$GITHUB_OUTPUT"
          else
            echo "compiler={\"include\":$(echo "$compiler" | jq -c --arg h "$P" '[.[]|select(.host==$h)]')}" >> "$GITHUB_OUTPUT"
          fi

  # 1–6. Per-host thin + full compiler. Manifest is projected from the committed
  # blobs catalog (T0797), full's dependency blobs are pulled from the
  # deps-<dep>-<version> release the maintainer pre-staged locally — no in-job
  # blob production.
  compiler:
    name: compiler ${{ matrix.host }}
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.compiler) }}
    runs-on: ${{ matrix.runner }}
    # `bin/release build` embeds resources, which regenerates the winlink import
    # libs via the build-only llvm-dlltool — self-fetched through
    # `gh release download` from deps-llvm-<version>. That needs GH_TOKEN, so set
    # it job-wide (the thin/full build steps run gh before the explicit
    # fetch-blobs step does). Read-only GITHUB_TOKEN suffices for asset downloads.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: compiler/go.mod
          cache: true
          cache-dependency-path: compiler/go.sum
      # No LLVM install step here either (T0798): `bin/build`/`bin/release
      # build` self-fetch the pinned LLVM (opt/llc/lld) from
      # `deps-llvm-<version>` via the slim brotli blob catalog — the same blobs
      # the runtime resolver fetches for end users. The forge prebuilts cache is
      # populated by EnsureLLVMBlobs and reused by phase B's findLLVMTool
      # (via the PROMISE_LLVM fallback chain). The maintainer pre-stages blobs
      # locally on a dep bump via `bin/release publish-blobs`; nothing in this
      # job has to install or extract a 700 MB upstream tarball.
      - name: Install musl (Linux)
        if: runner.os == 'Linux'
        # Linux static link still needs musl-dev. No llvm-22 / lld-22 install.
        run: sudo apt-get install -y musl-dev
      - name: Bootstrap dev tools (Unix)
        if: runner.os != 'Windows'
        run: ./make
      - name: Bootstrap dev tools (Windows)
        if: runner.os == 'Windows'
        run: .\make.cmd
      - name: Project per-epoch manifest from blobs catalog
        shell: bash
        # The runtime manifest is a projection of `tools/build/blobs.json` (the
        # committed catalog of every hosted blob across versions, T0797) into the
        # epoch's pinned dep version. No blobs need to be staged in this job — the
        # manifest's blob source URLs point at the pre-hosted `deps-<dep>-<version>`
        # release. No --tag here: the deps release tag is catalog-derived (passing
        # ${{ github.ref_name }} would make fetch-blobs 404 on every entry).
        run: |
          mkdir -p dist
          bin/release manifest --from-catalog \
            --host ${{ matrix.host }} \
            --out dist/manifest-${{ matrix.host }}.json
      - name: Build thin compiler (manifest + stub embedded)
        shell: bash
        run: |
          bin/release build --variant thin \
            --manifest dist/manifest-${{ matrix.host }}.json \
            --out dist/bin/promise-${{ matrix.host }}${{ matrix.ext }}
      - name: Fetch dependency blobs for full variant
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pulls each manifest entry's primary blob source from the deps release
        # and brotli-decompresses to `dist/blobs/<file>`, keeping the compressed
        # `<sha>.br` alongside (--keep-compressed) so the full build can embed the
        # brotli blob directly with no gzip recompress (T0807). Used as `--blobs`
        # for `bin/release build --variant full`. Auth via GH_TOKEN so the
        # private-repo flow works pre-T0786.
        run: bin/release fetch-blobs --manifest dist/manifest-${{ matrix.host }}.json --out dist/blobs --keep-compressed
      - name: Build full compiler (host blobs pre-staged)
        shell: bash
        run: |
          bin/release build --variant full \
            --manifest dist/manifest-${{ matrix.host }}.json \
            --blobs dist/blobs \
            --out dist/bin/promise-${{ matrix.host }}-full${{ matrix.ext }}
      # Publish needs the binaries + the manifest. Compressed deps are NOT attached
      # to the epoch release any more — they live in the `deps-<dep>-<version>`
      # release that the maintainer pre-staged (T0797).
      - uses: actions/upload-artifact@v7
        with:
          name: release-bin-${{ matrix.host }}
          path: |
            dist/bin
            dist/manifest-${{ matrix.host }}.json

  # 7. Integrity gate, checksum, and cut the Release. Skipped on a build-only
  # dispatch (publish=false); runs on a tag push, or a dispatch with publish=true.
  publish:
    needs: [compiler]
    if: ${{ github.event_name == 'push' || inputs.publish }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false   # needed only to attach the committed scripts/install.*
      - uses: actions/setup-go@v6
        with:
          go-version-file: compiler/go.mod
          cache: true
          cache-dependency-path: compiler/go.sum
      - name: Bootstrap dev tools
        run: ./make
      - name: Download all compiler artifacts
        uses: actions/download-artifact@v8
        with:
          # merge-multiple flattens every release-bin-<host> into one dist/ tree
          # (v4 otherwise nests each artifact in its own subdir).
          pattern: release-bin-*
          merge-multiple: true
          path: dist
      - name: Fetch dependency blobs (for integrity gate)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Pull each manifest's blobs into dist/deps with the compressed `<sha>.br`
        # retained — verify-manifest hashes the DECOMPRESSED bytes and asserts the
        # sha matches the manifest's CAS hash.
        run: |
          mkdir -p dist/deps
          for m in dist/manifest-*.json; do
            bin/release fetch-blobs --manifest "$m" --out dist/deps --keep-compressed
          done
      - name: Verify manifest resolves (fail the release on any mismatch)
        run: bin/release verify-manifest dist/manifest-*.json --against dist/deps
      - name: Compress binaries with gzip (T0796)
        # gzip every published `promise-*` binary; the install scripts and `promise
        # update`/`sync` download `.gz` only — no raw asset is published. `-9` for
        # max ratio; `-n` strips the embedded mtime so re-runs of the same commit
        # produce byte-identical artifacts. `gzip` is preinstalled on ubuntu-24.04.
        # Drop the per-binary .sha256 sidecars `bin/release build` wrote so the glob
        # only sees binaries.
        run: |
          cd dist/bin
          rm -f ./*.sha256
          for f in promise-*; do
            gzip -9 -n "$f"
          done
      - name: Generate SHA256SUMS (over the .gz assets — what users download)
        run: |
          cd dist/bin
          sha256sum promise-*.gz > ../SHA256SUMS
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The install scripts are committed (scripts/install.*) and attached verbatim —
        # nothing generates them. epoch-next cuts a GitHub pre-release (next channel).
        # Dependency blobs are NOT attached here — they live in deps-<dep>-<version>
        # (T0797).
        run: |
          if [ "$GITHUB_REF_NAME" = "epoch-next" ]; then
            PRERELEASE="--prerelease"
            TITLE="Promise epoch-next (pre-release)"
            # epoch-next is a MOVING channel tag, re-cut on every push (§6). A prior
            # run already created its release, and `gh release create` refuses to
            # clobber an existing one — so delete it first. `gh release delete` keeps
            # the git tag by default (no --cleanup-tag), and the tag is the trigger,
            # so it must survive. `|| true` covers the first-ever run (no release yet).
            gh release delete "$GITHUB_REF_NAME" --yes 2>/dev/null || true
          else
            PRERELEASE=""
            TITLE="Promise epoch ${GITHUB_REF_NAME#epoch-}"
          fi
          gh release create "$GITHUB_REF_NAME" $PRERELEASE \
            --title "$TITLE" \
            --notes "See docs/changelog.md for this epoch." \
            dist/bin/promise-*.gz \
            dist/SHA256SUMS \
            scripts/install.sh scripts/install.ps1 scripts/install.cmd
