[catalog]
epoch = "2026.2"

[modules.std]
description = "Standard library (auto-imported into every file)"

[modules.strings]
description = "String utility functions: join, reverse, is_blank, spaces, repeat_join"

[modules.math]
description = "Pure math utilities: lerp, map_range, deg/rad conversion, sign, gcd, lcm"

[modules.path]
description = "File path manipulation: join, basename, dirname, extension, stem"

[modules.io]
description = "File and directory I/O: File (open/create/append/read/write/close), Dir (make/remove/exists), IoError"

[modules.json]
description = "JSON encoding and decoding: JsonEncoder, JsonDecoder, encode_string, decode_string"

[modules.http]
description = "HTTP client and server over the net module: Request/Response, methods, headers, send; Server with Handler, ServerRequest, and graceful shutdown"

[modules.os]
description = "Operating system interface: args, env vars, one-shot execute, streaming Process (spawn/wait/kill) with stdin/stdout/stderr pipes, OS info (user/hostname/pid), and signal handling"

[modules.time]
description = "Time and duration operations (placeholder — pending native PAL support)"

[modules.net]
description = "TCP networking: TcpListener, TcpStream with reactor-based non-blocking I/O"

[modules.gzip]
description = "RFC 1951 (DEFLATE) and RFC 1952 (gzip) compression and decompression in pure Promise: gzip_encode, gunzip, deflate, inflate, crc32, GzipWriter, GunzipReader, gunzip_from, DecompressError"

[modules.wasi_preview_1]
url = "https://github.com/promise-language/wasi_preview_1.git"
commit = "c6437c59c3649f545b6ad032556811d718d20412"
description = "WASI Preview 1 raw bindings: errno/flags/enums plus extern function declarations (target(wasi) only; function calls pending T0283)"

[modules.wasi_preview_2]
url = "https://github.com/promise-language/wasi_preview_2.git"
commit = "34f145d947b09e0428a3fc3bb8305e69690439be"
description = "WASI Preview 2 bindings: random, clocks, I/O, CLI, filesystem (target(wasi) only)"

# Planned modules — not yet implemented, design in modules/<name>/plan.md

[modules.term]
description = "Terminal UI: raw mode, cell buffer, styled text, input events, cursor control (planned)"

[modules.toml]
description = "TOML 1.0.0 encoding and decoding: TomlEncoder, TomlDecoder, encode_string, decode_string, parse_value (planned)"

[modules.yaml]
description = "YAML 1.2 encoding and decoding: YamlEncoder, YamlDecoder, encode_string, decode_string, parse_value (planned)"

[modules.msgpack]
description = "MessagePack binary encoding and decoding: MsgpackEncoder, MsgpackDecoder, encode_bytes, decode_bytes, parse_value (planned)"

[modules.markdown]
description = "CommonMark 0.31 + GFM parsing and rendering: Document (with Document.parse factory), Block, Inline, Builder (planned)"

[modules.schema]
description = "Type-driven schema generation: Type tagged enum, Hash128 identity, `id and `entity metas, schema.of[T]/for_func[F] (planned — see docs/schema.md, T0446)"

[modules.auth]
description = "Authentication primitives: Credential, TokenProvider, StaticToken, EnvToken, credential store (planned — see docs/ai-platform.md §4, T0449)"

[modules.ai]
description = "Provider-neutral agent orchestration: Provider interface, MockProvider, Agent, Tool, sessions, multi-agent. Vendor providers live in community modules (planned — see docs/ai-platform.md §5, T0450/T0453)"

[modules.mcp]
description = "Model Context Protocol: Server, Client, stdio/SSE/HTTP transports; tools/resources/prompts (planned — see docs/ai-platform.md §6, T0451)"

[modules.sandbox]
description = "Capability-controlled execution: Capability enum, Sandbox, ExecutionResult; PAL-level enforcement (planned — see docs/ai-platform.md §7, T0452)"

[modules.cloud]
description = "Schema-driven durable state: Ref/Inverse, single-endpoint sync protocol, block-scoped transactions, pluggable Backend (planned — see docs/cloud-persistence.md, T0456)"
