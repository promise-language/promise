[catalog]
epoch = "2026.3"

[modules.std]
description = "Standard library (auto-imported into every file)"

[modules.strings]
description = "String utility functions: join, reverse, is_blank, spaces, repeat_join"

[modules.math]
description = "Pure math utilities: lerp, map_range, deg/rad conversion, sign, gcd, lcm"

[modules.path]
description = "File path manipulation: join, basename, dirname, extension, stem"

[modules.io]
description = "File and directory I/O: File (open/create/append/read/write/close), Dir (make/remove/exists), IoError"

[modules.json]
description = "JSON encoding and decoding: JsonEncoder, JsonDecoder, encode_string, decode_string"

[modules.http]
description = "HTTP client and server (placeholder — pending native networking support)"

[modules.os]
description = "Operating system interface: args, env, exit (placeholder — pending native PAL support)"

[modules.time]
description = "Time and duration operations (placeholder — pending native PAL support)"

[modules.net]
description = "TCP networking: TcpListener, TcpStream with reactor-based non-blocking I/O"

