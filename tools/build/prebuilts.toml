# Pinned prebuilt binaries embedded in `bin/promise --release`.
#
# Use `bin/build --release --fetch` to download from the URLs below instead of
# bundling whatever is locally installed (Homebrew on macOS, apt llvm-22 on
# Linux, manual install dir on Windows).
#
# To pin a new version: bump `version`, update URLs, run `bin/pin-prebuilts`
# (which downloads each URL, computes its sha256, and writes it back here).
# Empty `sha256` skips verification with a loud warning — fine for development,
# MUST be filled in before release.
#
# The `out` field is the cache-relative file name *without* the .gz suffix.
# At build time, the file is gzipped into the embed dir as "<out>.gz". At
# runtime / in the prebuilts cache, it lives as "<out>" (raw, executable).

schema = 1

# ----------------------------------------------------------------------------
# LLVM toolchain (opt, llc, lld, libLLVM) — required for codegen + linking.
# ----------------------------------------------------------------------------
[binaries.llvm]
version = "22.1.0"
# Where bundle ops write their gzipped output (relative to repo root).
# The runtime extraction layer in compiler/cmd/promise/llvm_*.go reads from
# <bundle_dir>/<target>/*.gz via //go:embed, so this path is fixed.
bundle_dir = "compiler/cmd/promise/resources/llvm"

[binaries.llvm.targets.linux-amd64]
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-Linux-X64.tar.xz"
sha256 = "8d662e425e46c48b45f5f970770b5e37f323607c8c2cbc371593fc9c4ba1e7b3"
# The upstream LLVM-22.1.0-Linux-X64.tar.xz ships statically-linked binaries
# (bin/lld is 199 MB, depends only on system libs). No libLLVM.so / liblld* /
# libz3 / libzstd shared libraries needed at runtime.
files = [
  { src = "bin/opt", out = "opt" },
  { src = "bin/llc", out = "llc" },
  { src = "bin/lld", out = "lld" },
]

[binaries.llvm.targets.darwin-arm64]
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-macOS-ARM64.tar.xz"
sha256 = "cd5e615f4dab23d0239359cd343202c5f6ceeaf072c245a3c685d73afac09646"
# The upstream LLVM-22.1.0-macOS-ARM64.tar.xz ships statically-linked binaries
# (bin/lld is 131 MB, depends only on system libs). No libLLVM.dylib /
# liblld*.dylib / libz3 / libzstd shared libraries needed at runtime.
files = [
  { src = "bin/opt", out = "opt" },
  { src = "bin/llc", out = "llc" },
  { src = "bin/lld", out = "lld" },
]

[binaries.llvm.targets.darwin-amd64]
# Upstream LLVM stopped publishing macOS x86_64 tarballs at version 22 (the
# release page only ships LLVM-22.1.0-macOS-ARM64.tar.xz). The entry stays
# here so a community member can fill it in later if they host an x86_64
# build under their own URL — until then, `bin/build --release` and
# `bin/build --release --fetch` will surface the `unsupported` reason
# verbatim and refuse to build for this target.
unsupported = "no upstream LLVM 22.1.0 tarball for macOS x86_64; Apple Silicon only on this release"
url = ""
sha256 = ""
files = []

[binaries.llvm.targets.windows-amd64]
url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/clang+llvm-22.1.0-x86_64-pc-windows-msvc.tar.xz"
sha256 = "2dd6a6c990865f98766dec58cce1cbfba48e5affc0098e5b1fff96c2f1d23e81"
files = [
  { src = "bin/opt.exe", out = "opt.exe" },
  { src = "bin/llc.exe", out = "llc.exe" },
  # Codegen aliases lld.exe to lld-link at runtime (see llvm_windows_amd64.go).
  { src = "bin/lld.exe", out = "lld.exe" },
]
