[catalog]
epoch = "2026.0"

[modules.std]
description = "Standard library (auto-imported into every file)"

[modules.strings]
description = "String utility functions: join, reverse, is_blank, spaces, repeat_join"

[modules.math]
description = "Pure math utilities: lerp, map_range, deg/rad conversion, sign, gcd, lcm"

[modules.path]
description = "File path manipulation: join, basename, dirname, extension, stem"

[modules.io]
description = "File and directory I/O: File (open/create/append/read/write/close), Dir (make/remove/exists), IoError"

[modules.json]
description = "JSON encoding and decoding: JsonEncoder, JsonDecoder, encode_string, decode_string"

[modules.http]
description = "HTTP client and server (placeholder — pending native networking support)"

[modules.os]
description = "Operating system interface: args, env, exit (placeholder — pending native PAL support)"

[modules.time]
description = "Time and duration operations (placeholder — pending native PAL support)"

[modules.net]
description = "TCP networking: TcpListener, TcpStream with reactor-based non-blocking I/O"

[modules.gzip]
description = "RFC 1951 (DEFLATE) and RFC 1952 (gzip) decompression in pure Promise: gunzip, inflate, crc32, DecompressError"

[modules.wasi]
url = "ssh://hfe/git/promise_wasi.git"
commit = "0acbef489f67a2825542e4554d1c41f9eb120b81"
description = "WASI Preview 1 raw bindings: errno/flags/enums plus extern function declarations (target(wasi) only; function calls pending T0283)"

[modules.wasi_preview_2]
url = "ssh://hfe/git/promise_wasi_preview_2.git"
commit = "7dcc0af400480f67d56710056ca5423227ae1c4c"
description = "WASI Preview 2 bindings: random, clocks, I/O, CLI, filesystem (target(wasi) only)"

# Planned modules — not yet implemented, design in modules/<name>/plan.md

[modules.term]
description = "Terminal UI: raw mode, cell buffer, styled text, input events, cursor control (planned)"

[modules.toml]
description = "TOML 1.0.0 encoding and decoding: TomlEncoder, TomlDecoder, encode_string, decode_string, parse_value (planned)"

[modules.yaml]
description = "YAML 1.2 encoding and decoding: YamlEncoder, YamlDecoder, encode_string, decode_string, parse_value (planned)"

[modules.msgpack]
description = "MessagePack binary encoding and decoding: MsgpackEncoder, MsgpackDecoder, encode_bytes, decode_bytes, parse_value (planned)"

[modules.markdown]
description = "CommonMark 0.31 + GFM parsing and rendering: Document (with Document.parse factory), Block, Inline, Builder (planned)"
