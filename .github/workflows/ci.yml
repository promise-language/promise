# Build + test CI (docs/release-automation.md §4) — MANUAL DISPATCH ONLY.
#
# This does NOT run on every push/PR. The project's internal gates already cover
# correctness: `bin/verify` is mandatory before every push, and periodic gates run
# stress + cross-platform checks. At 20-80 commits/day on a private repo (where
# Actions minutes are metered and macOS bills 10x), per-commit CI is not feasible.
# This workflow exists to validate that the build+test toolchain works on GitHub
# runners for the release pipeline (release.yml). Dispatch it on demand, picking a
# single platform to control cost. It does NOT produce release artifacts — that is
# release.yml, triggered by an `epoch-*` tag.
name: CI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build + test"
        type: choice
        default: all
        options:
          - all
          - linux-amd64
          - darwin-arm64
          - windows-amd64
      run_tests:
        description: "Run the full test suite (false = build only — a cheap toolchain check; the suite is slow and macOS bills 10x)"
        type: boolean
        default: true

# CI only builds and tests — it never writes to the repo. Pin the GITHUB_TOKEN to
# read-only (least privilege); release.yml is the only workflow that needs write.
permissions:
  contents: read

jobs:
  # Resolve the dispatch-selected platform(s) into the test matrix. A job-level
  # `if` cannot reference the `matrix` context, so filtering happens HERE in a tiny
  # Linux job — non-selected platforms then never spin up a runner at all (matters:
  # macOS bills 10x).
  setup:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        env:
          PLATFORM: ${{ github.event.inputs.platform }}
        run: |
          all='[
            {"name":"linux-amd64","runner":"ubuntu-24.04"},
            {"name":"darwin-arm64","runner":"macos-latest"},
            {"name":"windows-amd64","runner":"windows-latest"}
          ]'
          # Deferred (docs/release-automation.md §7): darwin-amd64 (macos-13, no working
          # Xcode CLT) and linux-arm64 (arm64 runner + arm64 LLVM blobs, T0524/T0530).
          if [ "$PLATFORM" = "all" ]; then
            inc=$(echo "$all" | jq -c .)
          else
            inc=$(echo "$all" | jq -c --arg n "$PLATFORM" '[.[] | select(.name == $n)]')
          fi
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"

  test:
    needs: setup
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Keep submodules OFF. The flow/flow-sdk submodules are NOT used to build
          # the compiler or run the gates (they back the tracker automation only),
          # and flow-sdk lives on an internal host (ssh://hfe/…) unreachable from
          # GitHub runners — `submodules: recursive` would make checkout FAIL.
          # Rationale also in CLAUDE.md / docs/release-automation.md §4 (NOT build-tools.md).
          submodules: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: compiler/go.mod
          cache: true
          cache-dependency-path: compiler/go.sum

      # No Java/ANTLR step: the generated parser (compiler/internal/parser/*.go) is
      # committed, so neither CI nor a release regenerates it.

      # No LLVM install step either: `bin/build` self-fetches the pinned LLVM
      # (opt/llc/lld) from the `deps-llvm-<version>` release the maintainer
      # pre-staged locally (T0798). The blobs are content-addressed brotli-11
      # slices — ~3-4× smaller than the upstream tarball, cached in the
      # host-stable prebuilts cache, and used identically by debug + release
      # builds. The `PROMISE_LLVM` env var still works for offline / air-gapped
      # CI; the fallback path in FindLLVM honors it before any network access.

      - name: Install musl (Linux)
        if: runner.os == 'Linux'
        # Linux still needs the musl CRT for static-linked output. LLVM itself
        # is fetched by `bin/build` (no apt llvm-22 / lld-22 install).
        run: sudo apt-get install -y musl-dev

      - name: Install wasmtime (runtime for the wasm32-wasi tests)
        uses: bytecodealliance/actions/wasmtime/setup@v1

      # bin/ is gitignored — the forge dev tools (bin/build, bin/test, …) are compiled
      # by ./make and refuse to run stale, so bootstrap them before any bin/* use.
      - name: Bootstrap dev tools (Unix)
        if: runner.os != 'Windows'
        run: ./make
      - name: Bootstrap dev tools (Windows)
        if: runner.os == 'Windows'
        run: .\make.cmd

      # shell: bash on all platforms so `bin/build` resolves uniformly (Git Bash on
      # windows-latest appends .exe → bin/build.exe).
      - name: Build compiler
        shell: bash
        run: bin/build

      - name: Test — Go + Promise
        if: ${{ inputs.run_tests }}
        shell: bash
        # Always bin/test [go|promise|all] — never `go test ./...` directly: bin/test
        # builds and embeds the stdlib/catalog modules first, which raw `go test` skips.
        # NOTE: no --wasm here. Running the full suite on wasm32-wasi ~doubles CI cost,
        # so the wasm target is covered by a separate periodic workflow, not per-PR CI.
        run: bin/test all
